<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="cadastro">
        <form id="cadastroForm">
            <h1>Cadastro</h1>
            
            <div class="input-box">
                <input type="text" id="cadastroName" placeholder="Digite seu nome completo" required>
                <i class='bx bxs-user-detail'></i>
            </div>

            <div class="input-box">
                <input type="email" id="cadastroEmail" placeholder="Digite seu email" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" id="cadastroPassword" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="input-box">
                <input type="password" id="cadastroConfirmPassword" placeholder="Confirme sua senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="remember-forgot">
                <label> <input type="checkbox"> Salvar</label>
            </div>

            <button class="btn2" type="submit">Cadastrar</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
