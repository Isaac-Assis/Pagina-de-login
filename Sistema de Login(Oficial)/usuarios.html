<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários Cadastrados</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* Estilos extras simples para a tabela ficar organizada dentro do seu layout azul */
        .lista-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto; /* Adiciona barra de rolagem se houver muitos usuários */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            color: #fff;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }
        th {
            font-weight: 800;
            background: rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="cadastro">
        <h1>Painel</h1>
        <div class="input-box" style="height: auto; margin: 10px 0;">
            <h2>Usuários Cadastrados:</h2>
        </div>
        
        <div class="lista-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                    </tr>
                </thead>
                <tbody id="tabelaUsuarios">
                    <tr>
                        <td colspan="2" style="text-align: center;">Carregando usuários...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <br>
        <button class="btn" onclick="window.location.href='index.html'">Sair</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
